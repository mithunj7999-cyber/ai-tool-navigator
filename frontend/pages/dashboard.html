<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Dashboard — AI Tool Navigator</title>
  <link rel="stylesheet" href="/css/base.css?v=2"/>
  <link rel="stylesheet" href="/css/dashboard.css?v=2"/>
</head>
<body>
<div class="bg"></div>
<div class="orb orb-1"></div><div class="orb orb-2"></div>
<div style="position:relative;z-index:1;">
  <nav class="navbar">
    <a href="/" class="nav-brand">
      <div class="nav-icon">✦</div>
      AI Tool Navigator
      <span class="nav-badge">Beta</span>
    </a>
    <div class="nav-right" id="navRight"></div>
  </nav>

  <div class="dash-wrap">
    <!-- User header -->
    <div class="dash-header fu" id="dashHeader">
      <div class="dash-greeting">👋 Welcome back</div>
      <div class="dash-name" id="dashName">Loading…</div>
      <div class="dash-email" id="dashEmail"></div>
      <div class="dash-stats">
        <div class="dash-stat">
          <div class="dash-stat-num" id="totalCount">0</div>
          <div class="dash-stat-label">Prompts Generated</div>
        </div>
        <div class="dash-stat">
          <div class="dash-stat-num" id="todayCount">0</div>
          <div class="dash-stat-label">Today</div>
        </div>
      </div>
    </div>

    <!-- History -->
    <div class="dash-sections">
      <div class="card" style="padding:24px;">
        <div class="dash-section-title">📋 Your Prompt History</div>
        <div class="history-grid" id="historyGrid">
          <div class="empty-state">
            <div class="loader on" style="justify-content:center;"><div class="dots"><span></span><span></span><span></span></div> Loading history…</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="/js/nav.js?v=2"></script>
<script src="/js/dashboard.js?v=2"></script>
</body>
</html>
